<!DOCTYPE html>
<html>
<head>
    <title>Third Place Selection - La Penca</title>
    <style>
        body { font-family: Arial; background:#111; color:white; padding:40px; }
        .navbar {
            background: #1f1f1f;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            margin: -40px -40px 40px -40px;
        }

        .logo { font-size: 22px; font-weight: bold; }

        .links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .links a:hover { color: #7CFC98; }

        .team {
            background:#222;
            padding:12px;
            border-radius:8px;
            margin:8px 0;
            max-width:500px;
            cursor:pointer;
        }

        .selected { background:#22c55e; }

        button {
            padding:12px;
            margin-top:20px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .message { margin-top:15px; color:#7CFC98; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🏆 La Penca</div>
    <div class="links">
        <a href="/party.html">Party</a>
        <a href="/group.html">Groups</a>
        <a href="/third-place.html">Third place</a>
        <a href="/knockout.html">Knockout</a>
        <a href="/bracket.html">Bracket</a>
        <a href="#">Leaderboard</a>
    </div>
</nav>

<h1>Välj bästa tredjeplatser</h1>
<p>Välj exakt <span id="slots"></span> lag som ska gå vidare.</p>

<div id="automatic"></div>
<div id="teams"></div>

<button onclick="saveSelection()">Spara och gå vidare</button>
<div id="message" class="message"></div>

<script>
    const username = localStorage.getItem("username");
    const code = localStorage.getItem("partyCode");

    const selectedTeams = [];
    const automaticTeams = [];
    let remainingSlots = 0;

    let savedTeams = [];

    Promise.all([
        fetch(`/third-place-selection?username=${username}&code=${code}`).then(res => res.json()),
        fetch(`/third-place-teams/saved?username=${username}&code=${code}`).then(res => res.json())
    ])
        .then(([data, saved]) => {

            savedTeams = saved.map(t => t.teamName);

            remainingSlots = data.remainingSlots;
            document.getElementById("slots").innerText = remainingSlots;

            const automatic = document.getElementById("automatic");

            if (data.qualifiedAutomatically.length > 0) {
                automatic.innerHTML = "<h2>Klara automatiskt</h2>";

                data.qualifiedAutomatically.forEach(team => {
                    automaticTeams.push(team.teamName);
                    automatic.innerHTML += `
                    <div class="team selected">
                        ${team.teamName} (${team.groupName})
                    </div>
                `;
                });
            }

            const teams = document.getElementById("teams");

            // 🔥 Om redan sparat → hoppa direkt
            if (savedTeams.length > 0) {
                teams.innerHTML = "<h2>Dina val</h2>";

                savedTeams.forEach(team => {
                    selectedTeams.push(team);

                    teams.innerHTML += `
                    <div class="team selected">
                        ${team}
                    </div>
                `;
                });

                document.getElementById("message").innerText =
                    "Dina val är redan sparade.";

                return;
            }

            if (data.tiedTeams.length === remainingSlots) {
                teams.innerHTML = "<h2>Går också vidare</h2>";

                data.tiedTeams.forEach(team => {
                    selectedTeams.push(team.teamName);

                    teams.innerHTML += `
                    <div class="team selected">
                        ${team.teamName} (${team.groupName}) - ${team.points} pts
                    </div>
                `;
                });

                document.getElementById("message").innerText =
                    "Alla kvarvarande lag går vidare automatiskt.";

                return;
            }

            teams.innerHTML = "<h2>Välj bland lika lag</h2>";

            data.tiedTeams.forEach(team => {

                const isSaved = savedTeams.includes(team.teamName);

                if (isSaved) selectedTeams.push(team.teamName);

                teams.innerHTML += `
                <div class="team ${isSaved ? 'selected' : ''}"
                     onclick="toggleTeam(this, '${team.teamName}', ${remainingSlots})">
                    ${team.teamName} (${team.groupName}) - ${team.points} pts
                </div>
            `;
            });
        });

    function toggleTeam(element, teamName, maxSlots) {
        const index = selectedTeams.indexOf(teamName);

        if (index >= 0) {
            selectedTeams.splice(index, 1);
            element.classList.remove("selected");
            return;
        }

        if (selectedTeams.length >= maxSlots) {
            alert("Du kan bara välja " + maxSlots + " lag.");
            return;
        }

        selectedTeams.push(teamName);
        element.classList.add("selected");
    }

    function saveSelection() {
        if (selectedTeams.length !== remainingSlots) {
            alert("Du måste välja exakt " + remainingSlots + " lag.");
            return;
        }

        const allQualifiedTeams = automaticTeams.concat(selectedTeams);

        const teamsParam = allQualifiedTeams.map(encodeURIComponent).join(",");

        fetch(`/third-place-selection/save?username=${username}&code=${code}&teams=${teamsParam}`)
            .then(res => res.json())
            .then(data => {
                window.location.href = "/knockout.html";
            });
    }
</script>

</body>
</html>
