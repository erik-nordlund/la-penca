<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Group Predictions - La Penca</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(34,197,94,0.14), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(13,110,253,0.14), transparent 35%),
                    #0f0f0f;
            color: white;
        }

        .navbar {
            background: rgba(31,31,31,0.92);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo { font-size: 22px; font-weight: bold; }

        .links a {
            color: #d7d7d7;
            text-decoration: none;
            margin-left: 18px;
            font-weight: bold;
            font-size: 14px;
        }

        .links a:hover,
        .links a.active { color: #7CFC98; }

        .page { padding: 42px 60px 70px; }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            background: rgba(34,197,94,0.14);
            color: #7CFC98;
            border: 1px solid rgba(124,252,152,0.35);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .badge.locked {
            background: rgba(255,107,107,0.12);
            color: #ff8b8b;
            border-color: rgba(255,107,107,0.35);
        }

        h1 {
            font-size: 48px;
            margin: 0 0 12px;
            line-height: 1;
        }

        .subtitle {
            color: #cfcfcf;
            font-size: 18px;
            margin: 0;
        }

        .info {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pill {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 9px 14px;
            color: #ddd;
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-bottom: 22px;
            background: rgba(31,31,31,0.86);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 18px;
            padding: 16px;
        }

        .progress-text {
            color: #aaa;
            font-size: 14px;
        }

        .progress-text strong { color: #7CFC98; }

        .toolbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .primary-btn,
        .secondary-btn {
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .primary-btn {
            background: linear-gradient(135deg, #0d6efd, #22c55e);
            color: white;
        }

        .secondary-btn {
            background: #151515;
            border: 1px solid rgba(255,255,255,0.16);
            color: white;
        }

        button:hover { filter: brightness(1.08); }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: none;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(360px, 1fr));
            gap: 18px;
        }

        .group-card {
            background: rgba(31,31,31,0.94);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 14px 45px rgba(0,0,0,0.28);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .group-title {
            font-size: 22px;
            font-weight: bold;
        }

        .group-progress {
            color: #aaa;
            font-size: 13px;
        }

        .match {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 10px;
            margin-top: 8px;
        }

        .team {
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .team.away { text-align: right; }

        .vs {
            color: #777;
            font-size: 12px;
            font-weight: bold;
        }

        .pick-buttons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .pick {
            width: 34px;
            height: 32px;
            border-radius: 9px;
            border: none;
            background: #0d6efd;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .pick.selected { background: #22c55e; }

        .saved-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: transparent;
            margin-left: 4px;
        }

        .saved-dot.saved {
            background: #7CFC98;
            box-shadow: 0 0 10px rgba(124,252,152,0.8);
        }

        .message {
            margin-top: 14px;
            min-height: 20px;
            color: #7CFC98;
            font-size: 14px;
        }

        .error {
            margin-top: 14px;
            min-height: 20px;
            color: #ff8b8b;
            font-size: 14px;
        }

        @media (max-width: 1300px) {
            .groups-grid {
                grid-template-columns: repeat(2, minmax(360px, 1fr));
            }
        }

        @media (max-width: 850px) {
            .page { padding: 30px 18px 60px; }

            .hero { display: block; }

            .info {
                justify-content: flex-start;
                margin-top: 18px;
            }

            h1 { font-size: 38px; }

            .groups-grid { grid-template-columns: 1fr; }

            .toolbar { display: block; }

            .toolbar-actions { margin-top: 14px; }

            .links { display: none; }

            .match { grid-template-columns: 1fr auto; }

            .team.away { text-align: left; }

            .vs { display: none; }

            .pick-buttons { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🏆 La Penca</div>
    <div class="links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/party.html">Party</a>
        <a href="/group.html" class="active">Groups</a>
        <a href="/third-place.html">Third place</a>
        <a href="/knockout-board.html">Knockout</a>
        <a href="/bracket.html">Bracket</a>
        <a href="/leaderboard.html">Leaderboard</a>
        <a href="/admin-results.html">Admin</a>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <div>
            <div id="lockBadge" class="badge">⚽ Group stage</div>
            <h1>Group predictions</h1>
            <p id="pageSubtitle" class="subtitle">Pick 1, X or 2 for every group match.</p>
        </div>

        <div class="info">
            <div class="pill">👤 <strong id="username">...</strong></div>
            <div class="pill">👥 Party <strong id="partyCode">...</strong></div>
        </div>
    </section>

    <section class="toolbar">
        <div class="progress-text">
            Progress: <strong id="savedCount">0</strong>/<span id="totalCount">0</span> predictions saved
            <div id="saveMessage" class="message"></div>
        </div>

        <div class="toolbar-actions">
            <button class="secondary-btn" onclick="scrollToTop()">Back to top</button>
            <button class="primary-btn" onclick="goToThirdPlace()">Continue to third place</button>
        </div>
    </section>

    <section id="matches" class="groups-grid"></section>
</main>

<script>
    const loggedInUser = localStorage.getItem("username");
    const code = localStorage.getItem("partyCode");

    const params = new URLSearchParams(window.location.search);
    const viewUser = params.get("viewUser");

    const username = viewUser || loggedInUser;
    const viewingOtherUser = !!viewUser && viewUser !== loggedInUser;

    if (!loggedInUser) {
        window.location.href = "/index.html";
    }

    if (!code) {
        window.location.href = "/party.html";
    }

    document.getElementById("username").innerText = username || "No user";
    document.getElementById("partyCode").innerText = code || "No party";

    const selected = {};
    let savedPredictions = {};
    let allGroupMatches = [];
    let predictionsLocked = false;

    Promise.all([
        fetch(`/party/lock-status?code=${encodeURIComponent(code)}`).then(res => res.json()),
        fetch(`/predictions?username=${encodeURIComponent(username)}&code=${encodeURIComponent(code)}`).then(res => res.json()),
        fetch("/matches").then(res => res.json())
    ])
        .then(([locked, predictions, matches]) => {
            predictionsLocked = locked || viewingOtherUser;
            renderLockStatus();

            predictions.forEach(p => {
                savedPredictions[p.match.id] = p.predictedOutcome;
                selected[p.match.id] = p.predictedOutcome;
            });

            allGroupMatches = matches.filter(m => m.stage === "GROUP");
            renderMatches(allGroupMatches);
            updateProgress();
        });

    function renderLockStatus() {
        const badge = document.getElementById("lockBadge");
        const subtitle = document.getElementById("pageSubtitle");
        const message = document.getElementById("saveMessage");

        if (viewingOtherUser) {
            badge.innerText = `👀 ${username}'s predictions`;
            subtitle.innerText = `You are viewing ${username}'s group predictions.`;
            message.className = "error";
            message.innerText = "View-only mode. You cannot change another player's predictions.";
            return;
        }

        if (predictionsLocked) {
            badge.innerText = "🔒 Predictions locked";
            badge.className = "badge locked";
            subtitle.innerText = "The deadline has passed. You can view your predictions, but you cannot change them.";
            message.className = "error";
            message.innerText = "Predictions are locked for this party.";
        }
    }

    function renderMatches(groupMatches) {
        const byGroup = {};

        groupMatches.forEach(match => {
            const groupName = match.homeTeam.groupName;
            if (!byGroup[groupName]) byGroup[groupName] = [];
            byGroup[groupName].push(match);
        });

        const container = document.getElementById("matches");
        container.innerHTML = "";

        Object.keys(byGroup).sort().forEach(group => {
            const card = document.createElement("div");
            card.className = "group-card";

            const savedInGroup = byGroup[group].filter(m => selected[m.id]).length;
            const totalInGroup = byGroup[group].length;

            card.innerHTML = `
                <div class="group-header">
                    <div class="group-title">Group ${group}</div>
                    <div class="group-progress" id="group-progress-${group}">
                        ${savedInGroup}/${totalInGroup}
                    </div>
                </div>
            `;

            byGroup[group].forEach(match => {
                card.appendChild(createMatchRow(match));
            });

            container.appendChild(card);
        });
    }

    function createMatchRow(match) {
        const row = document.createElement("div");
        row.className = "match";
        row.id = `match-${match.id}`;
        row.dataset.group = match.homeTeam.groupName;

        row.innerHTML = `
            <div class="team">${match.homeTeam.name}</div>
            <div class="vs">vs</div>
            <div class="team away">${match.awayTeam.name}</div>

            <div class="pick-buttons">
                <button class="pick ${selected[match.id] === 'HOME_WIN' ? 'selected' : ''}"
                        ${predictionsLocked ? "disabled" : ""}
                        onclick="savePrediction(${match.id}, 'HOME_WIN')">1</button>

                <button class="pick ${selected[match.id] === 'DRAW' ? 'selected' : ''}"
                        ${predictionsLocked ? "disabled" : ""}
                        onclick="savePrediction(${match.id}, 'DRAW')">X</button>

                <button class="pick ${selected[match.id] === 'AWAY_WIN' ? 'selected' : ''}"
                        ${predictionsLocked ? "disabled" : ""}
                        onclick="savePrediction(${match.id}, 'AWAY_WIN')">2</button>

                <span id="saved-${match.id}" class="saved-dot ${selected[match.id] ? 'saved' : ''}"></span>
            </div>
        `;

        return row;
    }

    function savePrediction(matchId, outcome) {
        if (predictionsLocked) {
            showMessage("Predictions are locked for this party.", true);
            return;
        }

        fetch(`/prediction/save?username=${encodeURIComponent(username)}&code=${encodeURIComponent(code)}&matchId=${matchId}&outcome=${outcome}`)
            .then(res => {
                if (!res.ok) {
                    throw new Error("Predictions are locked or could not be saved.");
                }
                return res.json();
            })
            .then(() => {
                selected[matchId] = outcome;

                const matchDiv = document.getElementById(`match-${matchId}`);
                matchDiv.querySelectorAll(".pick").forEach(btn => {
                    btn.classList.remove("selected");
                });

                const buttons = matchDiv.querySelectorAll(".pick");
                if (outcome === "HOME_WIN") buttons[0].classList.add("selected");
                if (outcome === "DRAW") buttons[1].classList.add("selected");
                if (outcome === "AWAY_WIN") buttons[2].classList.add("selected");

                document.getElementById(`saved-${matchId}`).classList.add("saved");

                updateProgress();
                updateGroupProgress(matchDiv.dataset.group);

                showMessage("Saved!");
                setTimeout(() => {
                    if (!predictionsLocked) {
                        document.getElementById("saveMessage").innerText = "";
                    }
                }, 900);
            })
            .catch(err => {
                showMessage(err.message, true);
            });
    }

    function showMessage(text, isError = false) {
        const message = document.getElementById("saveMessage");
        message.className = isError ? "error" : "message";
        message.innerText = text;
    }

    function updateProgress() {
        const savedCount = Object.keys(selected).length;
        const totalCount = allGroupMatches.length;

        document.getElementById("savedCount").innerText = savedCount;
        document.getElementById("totalCount").innerText = totalCount;
    }

    function updateGroupProgress(group) {
        const groupMatches = allGroupMatches.filter(m => m.homeTeam.groupName === group);
        const savedInGroup = groupMatches.filter(m => selected[m.id]).length;

        const el = document.getElementById(`group-progress-${group}`);
        if (el) {
            el.innerText = `${savedInGroup}/${groupMatches.length}`;
        }
    }

    function goToThirdPlace() {
        if (viewingOtherUser) {
            window.location.href = `/third-place.html?viewUser=${encodeURIComponent(username)}`;
            return;
        }

        window.location.href = "/third-place.html";
    }

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
</script>

</body>
</html>
