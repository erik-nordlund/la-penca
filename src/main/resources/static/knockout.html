<!DOCTYPE html>
<html>
<head>
    <title>Knockout - La Penca</title>
    <style>
        body { font-family: Arial; background:#111; color:white; padding:40px; }
        .navbar {
            background: #1f1f1f;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            margin: -40px -40px 40px -40px;
        }
        .logo { font-size: 22px; font-weight: bold; }
        .links a { color: white; text-decoration: none; margin-left: 20px; }
        .links a:hover { color: #7CFC98; }

        .round { margin-bottom:40px; }
        .match { background:#222; padding:15px; border-radius:8px; margin:10px 0; max-width:600px; }
        button { display:block; width:100%; padding:10px; margin-top:8px; border:none; border-radius:6px; cursor:pointer; background:#0d6efd; color:white; }
        button.selected { background:#22c55e; }
        .slot { color:#aaa; font-size:13px; margin-bottom:8px; }
        .champion { font-size:28px; margin-top:30px; color:#7CFC98; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🏆 La Penca</div>
    <div class="links">
        <a href="/party.html">Party</a>
        <a href="/group.html">Groups</a>
        <a href="/third-place.html">Third place</a>
        <a href="/knockout.html">Knockout</a>
        <a href="/bracket.html">Bracket</a>
        <a href="/leaderboard.html">Leaderboard</a>
        <a href="/admin-results.html">Admin</a>
    </div>
</nav>

<h1>Knockout Predictions</h1>

<div id="content"></div>

<script>
    const username = localStorage.getItem("username");
    const code = localStorage.getItem("partyCode");

    const rounds = [
        { name: "ROUND_OF_32", title: "Round of 32", url: "/round-of-32", next: "ROUND_OF_16" },
        { name: "ROUND_OF_16", title: "Round of 16", url: "/round-of-16", next: "QUARTER_FINAL" },
        { name: "QUARTER_FINAL", title: "Quarter Finals", url: "/quarter-finals", next: "SEMI_FINAL" },
        { name: "SEMI_FINAL", title: "Semi Finals", url: "/semi-finals", next: "THIRD_PLACE" },
        { name: "THIRD_PLACE", title: "Third Place Match", url: "/third-place-match", next: "FINAL" },
        { name: "FINAL", title: "Final", url: "/final", next: null }
    ];

    let currentRoundIndex = 0;
    const selectedByRound = {};
    const savedKnockoutPredictions = {};

    loadSavedThenStart();

    function loadSavedThenStart() {
        fetch(`/knockout/predictions?username=${username}&code=${code}`)
            .then(res => res.json())
            .then(predictions => {
                predictions.forEach(p => {
                    if (!savedKnockoutPredictions[p.roundName]) {
                        savedKnockoutPredictions[p.roundName] = {};
                    }

                    savedKnockoutPredictions[p.roundName][p.matchNumber] = {
                        winner: p.predictedWinner.name,
                        slot: p.slot
                    };
                });

                loadRound();
            });
    }

    function loadRound() {
        const round = rounds[currentRoundIndex];

        fetch(`${round.url}?username=${username}&code=${code}`)
            .then(res => {
                if (!res.ok) {
                    throw new Error("Could not load " + round.title);
                }
                return res.json();
            })
            .then(matches => {
                renderRound(round, matches);

                const savedForRound = savedKnockoutPredictions[round.name] || {};
                const expectedMatches = matches.length;
                const savedCount = Object.keys(savedForRound).length;

                if (savedCount === expectedMatches) {
                    Object.keys(savedForRound).forEach(matchNumber => {
                        selectedByRound[round.name][matchNumber] = savedForRound[matchNumber].winner;
                    });

                    if (round.next === null) {
                        showChampion(savedForRound[1].winner);
                        return;
                    }

                    currentRoundIndex++;
                    loadRound();
                }
            })
            .catch(err => {
                document.getElementById("content").innerHTML +=
                    `<p style="color:red;">${err.message}</p>`;
            });
    }

    function renderRound(round, matches) {
        selectedByRound[round.name] = {};

        let html = `<div class="round" id="${round.name}">
            <h2>${round.title}</h2>
        `;

        const savedForRound = savedKnockoutPredictions[round.name] || {};

        matches.forEach((match, index) => {
            const matchNumber = index + 1;
            const savedWinner = savedForRound[matchNumber]?.winner;

            html += `
                <div class="match" id="${round.name}-${matchNumber}">
                    <div class="slot">${match.slot}</div>

                    <button class="${savedWinner === match.homeTeam ? 'selected' : ''}"
                            onclick="pickWinner('${round.name}', ${matchNumber}, '${escapeText(match.slot)}', '${escapeText(match.homeTeam)}', this)">
                        ${match.homeTeam}
                    </button>

                    <button class="${savedWinner === match.awayTeam ? 'selected' : ''}"
                            onclick="pickWinner('${round.name}', ${matchNumber}, '${escapeText(match.slot)}', '${escapeText(match.awayTeam)}', this)">
                        ${match.awayTeam}
                    </button>
                </div>
            `;
        });

        html += `</div>`;

        document.getElementById("content").innerHTML += html;
    }

    function pickWinner(roundName, matchNumber, slot, winner, button) {
        fetch(`/knockout/save?username=${username}&code=${code}&round=${roundName}&matchNumber=${matchNumber}&slot=${encodeURIComponent(slot)}&winner=${encodeURIComponent(winner)}`)
            .then(res => res.json())
            .then(saved => {
                selectedByRound[roundName][matchNumber] = winner;

                if (!savedKnockoutPredictions[roundName]) {
                    savedKnockoutPredictions[roundName] = {};
                }

                savedKnockoutPredictions[roundName][matchNumber] = {
                    winner: winner,
                    slot: slot
                };

                const matchDiv = document.getElementById(`${roundName}-${matchNumber}`);
                matchDiv.querySelectorAll("button").forEach(btn => btn.classList.remove("selected"));
                button.classList.add("selected");

                checkIfRoundComplete(roundName);
            });
    }

    function checkIfRoundComplete(roundName) {
        const round = rounds[currentRoundIndex];
        const matchDivs = document.querySelectorAll(`#${roundName} .match`);

        if (Object.keys(selectedByRound[roundName]).length !== matchDivs.length) {
            return;
        }

        if (round.next === null) {
            const champion = Object.values(selectedByRound[roundName])[0];
            showChampion(champion);
            return;
        }

        currentRoundIndex++;
        loadRound();
    }

    function showChampion(champion) {
        if (document.getElementById("champion")) return;

        document.getElementById("content").innerHTML +=
            `<div id="champion" class="champion">🏆 Champion: ${champion}</div>`;
    }

    function escapeText(text) {
        return String(text).replace(/'/g, "\\'");
    }
</script>

</body>
</html>
