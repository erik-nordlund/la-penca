name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/la-penca-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/la-penca/"

      - name: Restart app on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 5m
          script: |
            docker stop lapenca-app || true
            docker rm lapenca-app || true
            docker run -d --name lapenca-app --network lapenca-network -p 8080:8080 --restart unless-stopped -e JDBC_DATABASE_URL=jdbc:postgresql://lapenca-db:5432/lapenca -e DB_USERNAME=postgres -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e PORT=8080 la-penca